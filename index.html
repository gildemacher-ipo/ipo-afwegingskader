<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept Afwegingskader IPO — interactief</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;
    --gray-50: #F1EFE8; --gray-600: #5F5E5A; --gray-800: #444441;
    --purple-50: #EEEDFE; --purple-600: #534AB7; --purple-800: #3C3489;
    --blue-50: #E6F1FB; --blue-600: #185FA5; --blue-800: #0C447C;
    --green-50: #EAF3DE; --green-600: #3B6D11; --green-800: #27500A;
    --amber-50: #FAEEDA; --amber-600: #854F0B; --amber-800: #633806;
    --text: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-hint: #888780;
    --bg: #ffffff;
    --surface: #f5f4f0;
    --border: rgba(0,0,0,0.1);
    --radius: 10px;
    --radius-lg: 14px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --teal-50: #085041; --teal-600: #5DCAA5; --teal-800: #9FE1CB;
      --gray-50: #2C2C2A; --gray-600: #B4B2A9; --gray-800: #D3D1C7;
      --purple-50: #26215C; --purple-600: #AFA9EC; --purple-800: #CECBF6;
      --blue-50: #042C53; --blue-600: #85B7EB; --blue-800: #B5D4F4;
      --green-50: #173404; --green-600: #97C459; --green-800: #C0DD97;
      --amber-50: #412402; --amber-600: #EF9F27; --amber-800: #FAC775;
      --text: #e8e6df;
      --text-secondary: #b4b2a9;
      --text-hint: #888780;
      --bg: #1a1a18;
      --surface: #242422;
      --border: rgba(255,255,255,0.1);
    }
  }

  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 28px 24px;
    min-height: 100vh;
  }

  header { margin-bottom: 28px; }
  header h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  header p { font-size: 14px; color: var(--text-secondary); }

  .layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    max-width: 1100px;
  }

  .infographic-col { flex: 1; min-width: 0; }

  .panel-col {
    width: 300px;
    flex-shrink: 0;
    position: sticky;
    top: 24px;
  }

  .panel {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    min-height: 220px;
  }

  .panel-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-hint);
    margin-bottom: 10px;
  }

  .panel-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .panel-body {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .panel-hint { font-size: 13px; color: var(--text-hint); line-height: 1.6; }

  .spinner {
    display: inline-block;
    width: 13px; height: 13px;
    border: 1.5px solid var(--border);
    border-top-color: var(--text-secondary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  svg .node { cursor: pointer; }
  svg .node:hover > g > rect { opacity: 0.82; }
  svg .node-sel > g > rect { stroke-width: 2 !important; }

  .c-teal rect { fill: var(--teal-50); stroke: var(--teal-600); }
  .c-teal .lbl { fill: var(--teal-800); font-weight: 500; }
  .c-teal .sub { fill: var(--teal-600); }
  .c-gray rect { fill: var(--gray-50); stroke: var(--gray-600); }
  .c-gray .lbl { fill: var(--gray-800); font-weight: 500; }
  .c-gray .sub { fill: var(--gray-600); }
  .c-purple rect { fill: var(--purple-50); stroke: var(--purple-600); }
  .c-purple .lbl { fill: var(--purple-800); font-weight: 500; }
  .c-purple .sub { fill: var(--purple-600); }
  .c-blue rect { fill: var(--blue-50); stroke: var(--blue-600); }
  .c-blue .lbl { fill: var(--blue-800); font-weight: 500; }
  .c-blue .sub { fill: var(--blue-600); }
  .c-green rect { fill: var(--green-50); stroke: var(--green-600); }
  .c-green .lbl { fill: var(--green-800); font-weight: 500; }
  .c-green .sub { fill: var(--green-600); }
  .c-amber rect { fill: var(--amber-50); stroke: var(--amber-600); }
  .c-amber .lbl { fill: var(--amber-800); font-weight: 500; }
  .c-amber .sub { fill: var(--amber-600); }

  text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  .lbl { font-size: 14px; }
  .sub { font-size: 12px; }
  .arr-line { stroke: var(--text-hint); stroke-width: 1; fill: none; }
  .sec-label { font-size: 12px; fill: var(--text-hint); }

  footer {
    margin-top: 32px;
    font-size: 12px;
    color: var(--text-hint);
    max-width: 1100px;
  }

  @media (max-width: 640px) {
    .layout { flex-direction: column; }
    .panel-col { width: 100%; position: static; }
  }
</style>
</head>
<body>

<header>
  <h1>Afwegingskader IPO</h1>
  <p>Klik op een onderdeel van de infographic voor een directe toelichting</p>
</header>

<div class="layout">
  <div class="infographic-col">
    <svg width="100%" viewBox="0 0 680 578" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="stroke:var(--text-hint)"/>
        </marker>
      </defs>

      <g class="node" id="b-doel" onclick="ask('Wat is het doel van het IPO-afwegingskader?','b-doel','Doel afwegingskader')">
        <g class="c-teal"><rect x="40" y="24" width="600" height="54" rx="8" stroke-width="0.5"/>
        <text class="lbl" x="340" y="44" text-anchor="middle" dominant-baseline="central">Doel: transparante keuzes over collectieve taken</text>
        <text class="sub" x="340" y="64" text-anchor="middle" dominant-baseline="central">Ondersteunt bestuur, KPS, AAC's en BAC's bij focus, rolvastheid en uitvoerbaarheid</text></g>
      </g>

      <line class="arr-line" x1="340" y1="78" x2="340" y2="96" marker-end="url(#ar)"/>
      <text class="sec-label" x="340" y="108" text-anchor="middle">IPO-organisatie — drie pijlers</text>

      <g class="node" id="b-ipo" onclick="ask('Wat doet het IPO-bureau?','b-ipo','IPO-bureau')">
        <g class="c-gray"><rect x="40" y="114" width="192" height="56" rx="8" stroke-width="0.5"/>
        <text class="lbl" x="136" y="133" text-anchor="middle" dominant-baseline="central">IPO-bureau</text>
        <text class="sub" x="136" y="153" text-anchor="middle" dominant-baseline="central">Beleid en belangenbehartiging</text></g>
      </g>

      <g class="node" id="b-hnp" onclick="ask('Wat doet het Huis van de Nederlandse Provincies in Brussel?','b-hnp','HNP Brussel')">
        <g class="c-gray"><rect x="244" y="114" width="192" height="56" rx="8" stroke-width="0.5"/>
        <text class="lbl" x="340" y="133" text-anchor="middle" dominant-baseline="central">HNP Brussel</text>
        <text class="sub" x="340" y="153" text-anchor="middle" dominant-baseline="central">Signalering en lobby in EU</text></g>
      </g>

      <g class="node" id="b-bij12" onclick="ask('Wat doet BIJ12?','b-bij12','BIJ12')">
        <g class="c-gray"><rect x="448" y="114" width="192" height="56" rx="8" stroke-width="0.5"/>
        <text class="lbl" x="544" y="133" text-anchor="middle" dominant-baseline="central">BIJ12</text>
        <text class="sub" x="544" y="153" text-anchor="middle" dominant-baseline="central">Uitvoering, data en expertise</text></g>
      </g>

      <line class="arr-line" x1="340" y1="170" x2="340" y2="188" marker-end="url(#ar)"/>
      <text class="sec-label" x="340" y="200" text-anchor="middle">6 afwegingscriteria — richtinggevend, geen harde randvoorwaarden</text>

      <g class="node" id="b-c1" onclick="ask('Wat houdt het afwegingscriterium direct opgavegericht in?','b-c1','1. Direct opgavegericht')">
        <g class="c-purple"><rect x="40" y="208" width="295" height="52" rx="8" stroke-width="0.5"/>
        <text class="lbl" x="187" y="226" text-anchor="middle" dominant-baseline="central">1. Direct opgavegericht</text>
        <text class="sub" x="187" y="246" text-anchor="middle" dominant-baseline="central">Kerntaken en bestuursprogramma</text></g>
      </g>

      <g class="node" id="b-c2" onclick="ask('Wat houdt het afwegingscriterium opgaveversterkend in?','b-c2','2. Opgaveversterkend')">
        <g class="c-purple"><rect x="345" y="208" width="295" height="52" rx="8" stroke-width="0.5"/>
        <text class="lbl" x="492" y="226" text-anchor="middle" dominant-baseline="central">2. Opgaveversterkend</text>
        <text class="sub" x="492" y="246" text-anchor="middle" dominant-baseline="central">Kennis, data, IV en monitoring</text></g>
      </g>

      <g class="node" id="b-c3" onclick="ask('Wat houdt collectieve meerwaarde in als afwegingscriterium?','b-c3','3. Collectieve meerwaarde')">
        <g class="c-purple"><rect x="40" y="268" width="295" height="52" rx="8" stroke-width="0.5"/>
        <text class="lbl" x="187" y="286" text-anchor="middle" dominant-baseline="central">3. Collectieve meerwaarde</text>
        <text class="sub" x="187" y="306" text-anchor="middle" dominant-baseline="central">Schaal, kwaliteit, positionering</text></g>
      </g>

      <g class="node" id="b-c4" onclick="ask('Wat houdt organiseerbaarheid en uitvoerbaarheid in als afwegingscriterium?','b-c4','4. Organiseerbaarheid')">
        <g class="c-purple"><rect x="345" y="268" width="295" height="52" rx="8" stroke-width="0.5"/>
        <text class="lbl" x="492" y="286" text-anchor="middle" dominant-baseline="central">4. Organiseerbaarheid</text>
        <text class="sub" x="492" y="306" text-anchor="middle" dominant-baseline="central">Uitvoerbaar, financieel geborgd</text></g>
      </g>

      <g class="node" id="b-c5" onclick="ask('Wat houdt generiek en schaalbaar in als afwegingscriterium?','b-c5','5. Generiek en schaalbaar')">
        <g class="c-purple"><rect x="40" y="328" width="295" height="52" rx="8" stroke-width="0.5"/>
        <text class="lbl" x="187" y="346" text-anchor="middle" dominant-baseline="central">5. Generiek en schaalbaar</text>
        <text class="sub" x="187" y="366" text-anchor="middle" dominant-baseline="central">Meerdere provincies ondersteund</text></g>
      </g>

      <g class="node" id="b-c6" onclick="ask('Wat houdt draagvlak en deelname in als afwegingscriterium?','b-c6','6. Draagvlak en deelname')">
        <g class="c-purple"><rect x="345" y="328" width="295" height="52" rx="8" stroke-width="0.5"/>
        <text class="lbl" x="492" y="346" text-anchor="middle" dominant-baseline="central">6. Draagvlak en deelname</text>
        <text class="sub" x="492" y="366" text-anchor="middle" dominant-baseline="central">Min. vier provincies betrokken</text></g>
      </g>

      <line class="arr-line" x1="340" y1="380" x2="340" y2="398" marker-end="url(#ar)"/>

      <g class="node" id="b-kps" onclick="ask('Wat is de rol van de KPS als strategisch opdrachtgever in het governance-model?','b-kps','Governance: KPS')">
        <g class="c-blue"><rect x="40" y="404" width="290" height="60" rx="8" stroke-width="0.5"/>
        <text class="lbl" x="185" y="422" text-anchor="middle" dominant-baseline="central">Governance: KPS</text>
        <text class="sub" x="185" y="443" text-anchor="middle" dominant-baseline="central">Strategisch opdrachtgever</text></g>
      </g>

      <g class="node" id="b-opbr" onclick="ask('Wat levert het afwegingskader de provincies op?','b-opbr','Opbrengst provincies')">
        <g class="c-green"><rect x="350" y="404" width="290" height="60" rx="8" stroke-width="0.5"/>
        <text class="lbl" x="495" y="422" text-anchor="middle" dominant-baseline="central">Opbrengst provincies</text>
        <text class="sub" x="495" y="443" text-anchor="middle" dominant-baseline="central">Slagkracht, focus en helderheid</text></g>
      </g>

      <line class="arr-line" x1="340" y1="464" x2="340" y2="482" marker-end="url(#ar)"/>

      <g class="node" id="b-toep" onclick="ask('Wie gebruiken het afwegingskader en hoe?','b-toep','Bestuurlijke toepassing')">
        <g class="c-amber"><rect x="40" y="488" width="600" height="54" rx="8" stroke-width="0.5"/>
        <text class="lbl" x="340" y="507" text-anchor="middle" dominant-baseline="central">Bestuurlijke toepassing</text>
        <text class="sub" x="340" y="527" text-anchor="middle" dominant-baseline="central">IPO-bestuur · KPS · Directie IPO/BIJ12 · AAC's en BAC's</text></g>
      </g>
    </svg>
  </div>

  <div class="panel-col">
    <div class="panel" id="panel">
      <div class="panel-label">Toelichting</div>
      <p class="panel-hint">Klik op een blok voor een directe uitleg van dat onderdeel.</p>
    </div>
  </div>
</div>

<footer>
  Afwegingskader IPO — concept versie KPS 09-04-2026
</footer>

<script>
let activeId = null;

async function ask(vraag, id, label) {
  if (activeId) document.getElementById(activeId)?.classList.remove('node-sel');
  activeId = id;
  document.getElementById(id)?.classList.add('node-sel');

  const panel = document.getElementById('panel');
  panel.innerHTML = `<div class="panel-label">${label}</div><p class="panel-hint"><span class="spinner"></span>Laden…</p>`;

  try {
    const response = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: vraag })
    });

    const data = await response.json();

    if (data.error) {
      panel.innerHTML = `<div class="panel-label">${label}</div><p class="panel-hint">Fout: ${data.error}</p>`;
      return;
    }

    const html = data.answer
      .replace(/\n\n/g, '</p><p class="panel-body">')
      .replace(/\n/g, ' ');

    panel.innerHTML = `<div class="panel-label">${label}</div><p class="panel-body">${html}</p>`;
  } catch (e) {
    panel.innerHTML = `<div class="panel-label">Fout</div><p class="panel-hint">Kon de server niet bereiken. Probeer opnieuw.</p>`;
  }
}
</script>
</body>
</html>
